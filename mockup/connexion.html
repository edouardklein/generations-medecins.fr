<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion — Générations Médecins</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/jpeg" href="logoGM.jpeg">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    .login-wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface);
      padding: 24px;
    }
    .login-card {
      width: 100%;
      max-width: 420px;
      background: white;
      border-radius: 20px;
      border: 1.5px solid var(--line);
      padding: 40px;
      box-shadow: 0 8px 40px rgba(50,106,162,0.1);
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .login-logo-badge {
      width: 36px; height: 36px;
      border-radius: 9px; overflow: hidden;
    }
    .login-logo-badge img { width: 100%; height: 100%; object-fit: cover; }
    .login-logo-txt { font-size: 13px; font-weight: 800; color: var(--blue-dark); line-height: 1.2; }
    .login-card h1 { font-size: 1.5rem; font-weight: 900; color: var(--blue-dark); margin-bottom: 6px; }
    .login-card .sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 28px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.78rem; font-weight: 700; color: var(--ink); margin-bottom: 5px; }
    .form-group input {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid var(--line); border-radius: 10px;
      font-family: inherit; font-size: 0.9rem; color: var(--ink);
      transition: border-color 0.2s; box-sizing: border-box;
    }
    .form-group input:focus { outline: none; border-color: var(--blue); }
    .btn-submit {
      width: 100%; padding: 13px;
      background: var(--grad); color: white;
      border: none; border-radius: 11px;
      font-family: inherit; font-size: 1rem; font-weight: 800;
      cursor: pointer; transition: opacity 0.2s; margin-top: 8px;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .alert {
      padding: 11px 14px; border-radius: 9px;
      font-size: 0.82rem; margin-bottom: 14px; display: none;
    }
    .alert.show { display: block; }
    .alert-error { background: rgba(220,38,38,0.08); color: #b91c1c; border: 1px solid rgba(220,38,38,0.2); }
    .form-footer { text-align: center; font-size: 0.78rem; color: var(--muted); margin-top: 20px; }
    .form-footer a { color: var(--blue); font-weight: 700; text-decoration: none; }
    .divider { border: none; border-top: 1px solid var(--line); margin: 20px 0; }
  </style>
</head>
<body>

  <div class="login-wrap">
    <div class="login-card">
      <div class="login-logo">
        <div class="login-logo-badge"><img src="logoGM.jpeg" alt="GM"></div>
        <span class="login-logo-txt">Générations<br>Médecins IDF</span>
      </div>

      <h1>Connexion</h1>
      <p class="sub">Accédez à votre espace membre.</p>

      <div id="alert-error" class="alert alert-error"></div>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="m.dupont@cabinet.fr" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Mot de passe</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit" id="submit-btn">Se connecter →</button>
      </form>

      <hr class="divider">
      <div class="form-footer">
        Pas encore membre ? <a href="adherer.html">Créer mon compte →</a>
      </div>
    </div>
  </div>

<script>
(function () {
  const SUPABASE_URL  = 'https://faegpfkhlkkwmtaichin.supabase.co';
  const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZhZWdwZmtobGtrd210YWljaGluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwOTEyODQsImV4cCI6MjA5NTY2NzI4NH0.pHJjb5RIuhRPRi1shnKvScnpLk5Wd8wOiDrmG2143xo';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON);

  // Déjà connecté → rediriger
  sb.auth.getSession().then(({ data: { session } }) => {
    if (session) window.location.href = 'espace-membre.html';
  });

  const form   = document.getElementById('login-form');
  const errBox = document.getElementById('alert-error');
  const btn    = document.getElementById('submit-btn');

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    errBox.classList.remove('show');
    btn.disabled = true;
    btn.textContent = 'Connexion…';

    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const { error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      errBox.textContent = '⚠️ ' + (error.message === 'Invalid login credentials'
        ? 'Email ou mot de passe incorrect.'
        : error.message);
      errBox.classList.add('show');
      btn.disabled = false;
      btn.textContent = 'Se connecter →';
      return;
    }

    window.location.href = 'espace-membre.html';
  });
})();
</script>
</body>
</html>
