[build]
  publish = "mockup"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."veille-cron"]
  schedule = "0 5 * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
