{{ define "styles" }}
<style>
  :root {
    --blue: #326aa2;
    --blue-dark: #17365f;
    --teal: #58aab3;
    --green: #89c86a;
    --ink: #152033;
    --muted: #536173;
    --line: #dce8eb;
    --surface: #f3fafa;
    --white: #ffffff;
    --max: 1080px;
  }

  * { box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    margin: 0;
    color: var(--ink);
    background:
      linear-gradient(180deg, rgba(243, 250, 250, 0.96), rgba(255, 255, 255, 1) 420px),
      var(--white);
    font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 17px;
    line-height: 1.65;
    text-rendering: optimizeLegibility;
  }

  img { max-width: 100%; height: auto; display: block; }

  a { color: inherit; }

  .site-header {
    width: min(100% - 40px, var(--max));
    margin: 0 auto;
    padding: 28px 0 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    font-weight: 800;
    color: var(--blue-dark);
    letter-spacing: 0;
  }

  .brand img { width: 72px; aspect-ratio: 1; border-radius: 18px; }

  .brand span { max-width: 13rem; line-height: 1.15; }

  .header-link {
    flex: 0 0 auto;
    border: 1px solid rgba(50, 106, 162, 0.22);
    border-radius: 999px;
    padding: 10px 16px;
    color: var(--blue-dark);
    text-decoration: none;
    font-weight: 700;
    font-size: 0.95rem;
    background: rgba(255, 255, 255, 0.76);
  }

  .header-actions { display: flex; align-items: center; gap: 10px; }

  main {
    width: min(100% - 40px, var(--max));
    margin: 0 auto;
  }

  h1, h2 {
    margin: 0;
    color: var(--blue-dark);
    line-height: 1.08;
    letter-spacing: 0;
  }

  h1 { max-width: 13ch; font-size: clamp(3rem, 8vw, 6.2rem); }

  h2 { font-size: clamp(1.75rem, 3vw, 2.45rem); }

  strong { color: var(--ink); font-weight: 800; }

  blockquote {
    margin: 26px 0 0 0;
    padding-left: 20px;
    border-left: 5px solid var(--green);
    color: var(--blue-dark);
    font-size: clamp(1.18rem, 2.2vw, 1.55rem);
    font-weight: 800;
    line-height: 1.35;
  }

  blockquote p { margin: 0; }

  main ul {
    display: grid;
    gap: 14px;
    margin: 0;
    padding: 0;
    list-style: none;
  }

  main li {
    position: relative;
    padding: 18px 18px 18px 52px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--white);
  }

  main li::before {
    content: "";
    position: absolute;
    left: 18px;
    top: 24px;
    width: 14px;
    height: 14px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--teal), var(--green));
  }

  .email-obfuscated {
    unicode-bidi: bidi-override;
    direction: rtl;
    color: var(--blue-dark);
    font-weight: 800;
    white-space: nowrap;
  }

  .site-footer {
    width: min(100% - 40px, var(--max));
    margin: 0 auto;
    padding: 28px 0 42px;
    color: var(--muted);
    font-size: 0.95rem;
    text-align: center;
  }

  @media (max-width: 760px) {
    body { font-size: 16px; }

    .site-header {
      width: min(100% - 28px, var(--max));
      padding-top: 18px;
    }

    .brand img { width: 58px; border-radius: 14px; }

    .brand span { max-width: 10rem; font-size: 0.96rem; }

    .header-link { padding: 9px 12px; font-size: 0.88rem; }

    .header-actions { gap: 8px; }

    main, .site-footer { width: min(100% - 28px, var(--max)); }

    h1 { max-width: 11ch; }

    main li { padding: 16px 16px 16px 46px; }

    main li::before { left: 16px; }
  }
</style>
{{ end }}

{{ define "main" }}
{{ .Content }}
{{ end }}
