name: Deploy

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          cat >> ~/.ssh/config <<EOF
          Host deploy
            HostName ${DEPLOY_HOST}
            User git
            IdentityFile ~/.ssh/deploy_key
            IdentitiesOnly yes
            StrictHostKeyChecking no
          EOF

      - name: Add deploy remote
        env:
          DEPLOY_REPO: ${{ secrets.DEPLOY_REPO }}
        run: |
          git remote add deploy "git@deploy:${DEPLOY_REPO}" 2>/dev/null || \
            git remote set-url deploy "git@deploy:${DEPLOY_REPO}"

      - name: Push to deploy
        run: git push deploy master:deploy --force
