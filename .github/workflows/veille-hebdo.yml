name: Veille hebdomadaire décrypteurs

on:
  schedule:
    - cron: "0 6 * * 1"   # Chaque lundi à 6h UTC (7h Paris heure d'hiver)
  workflow_dispatch:        # Lancement manuel possible depuis GitHub Actions

jobs:
  veille:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Installer les dépendances
        run: pip install -r pipeline/requirements.txt

      - name: Lancer la veille
        working-directory: pipeline
        env:
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python main.py
